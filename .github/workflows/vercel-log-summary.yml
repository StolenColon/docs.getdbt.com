name: Summarize Vercel build failures

on:
    workflow_dispatch: # lets you run it manually from the Actions tab

jobs:
  summarize-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Download logs
        run: |
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          echo "Fetching deployments for branch: $BRANCH_NAME"

          DEPLOYMENTS_JSON=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-githubCommitRef=$BRANCH_NAME")

          DEPLOYMENT_ID=$(echo "$DEPLOYMENTS_JSON" | jq -r '.deployments[0].uid')

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" == "null" ]; then
            echo "No deployment found."
            exit 1
          fi

          echo "Using deployment ID: $DEPLOYMENT_ID"

          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/deployments/$DEPLOYMENT_ID/events" > logs.json

          # Extract logs into a file for grepping
          jq -r '.[] | select(.type == "stdout" or .type == "stderr") | .payload' logs.json > logs.txt

      - name: Summarize errors
        id: summarize
        run: |
          summary=$(grep -i "broken link" logs.txt || echo "No broken links found.")
          echo "summary=$summary" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.summarize.outputs.summary }}`;
            const prNumber = context.payload.workflow_run.pull_requests[0].number;

            if (!summary || summary.includes("No broken links")) {
              console.log("No comment needed.");
              return;
            }

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 **Vercel build failed due to a broken link.**

\`\`\`
${summary}
\`\`\`

Please check the broken link and re-run the deployment. 💡`
            });
